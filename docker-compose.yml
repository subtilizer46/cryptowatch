version: '3.9'

services:
  web:
    build: .
    container_name: cryptowatch_web
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - sqlite_data:/app/data
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-cryptowatch-dev-key-change-in-production
      - DB_PATH=/app/data/db.sqlite3
    restart: unless-stopped

volumes:
  sqlite_data:
